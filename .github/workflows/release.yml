name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-2022
            target: windows-x64
          - os: windows-11-arm
            target: windows-arm64
            rust-target: aarch64-pc-windows-msvc
          - os: ubuntu-22.04
            target: linux-x64
            arch: x86_64
          - os: ubuntu-22.04-arm
            target: linux-arm64
            arch: arm64
          - os: macos-14
            target: macos-universal
            rust-target: universal-apple-darwin

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Add Windows ARM64 target
        if: matrix.target == 'windows-arm64'
        run: rustup target add aarch64-pc-windows-msvc

      - name: Add macOS targets
        if: matrix.target == 'macos-universal'
        run: rustup target add aarch64-apple-darwin x86_64-apple-darwin

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euxo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential pkg-config curl wget file patchelf libssl-dev rpm xdg-utils \
            libgtk-3-dev librsvg2-dev libayatana-appindicator3-dev
          sudo apt-get install -y --no-install-recommends libwebkit2gtk-4.1-dev \
            || sudo apt-get install -y --no-install-recommends libwebkit2gtk-4.0-dev
          sudo apt-get install -y --no-install-recommends libsoup-3.0-dev \
            || sudo apt-get install -y --no-install-recommends libsoup2.4-dev

      - name: Setup pnpm
        if: matrix.target != 'windows-arm64'
        uses: pnpm/action-setup@v6
        with:
          version: 10.12.3
          run_install: false

      - name: Setup pnpm on Windows ARM64
        if: matrix.target == 'windows-arm64'
        shell: pwsh
        run: |
          corepack enable
          corepack prepare pnpm@10.12.3 --activate

      - name: Setup LLVM on Windows ARM64
        if: matrix.target == 'windows-arm64'
        shell: pwsh
        run: |
          $llvmBin = 'C:\Program Files\LLVM\bin'
          "LIBCLANG_PATH=$llvmBin" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          $llvmBin | Out-File -FilePath $env:GITHUB_PATH -Append -Encoding utf8

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Configure updater signing
        shell: bash
        env:
          SIGNING_KEY_B64: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_B64 }}
        run: |
          set -euo pipefail
          if [ -z "$SIGNING_KEY_B64" ]; then
            echo "TAURI_SIGNING_PRIVATE_KEY_B64 is not configured" >&2
            exit 1
          fi
          key_path="$RUNNER_TEMP/zx-code-updater.key"
          node -e "require('fs').writeFileSync(process.argv[1], Buffer.from(process.env.SIGNING_KEY_B64, 'base64'))" "$key_path"
          echo "TAURI_SIGNING_PRIVATE_KEY=$key_path" >> "$GITHUB_ENV"

      - name: Build macOS Universal
        if: matrix.target == 'macos-universal'
        run: pnpm tauri build --target universal-apple-darwin

      - name: Build Windows x64
        if: matrix.target == 'windows-x64'
        run: pnpm tauri build

      - name: Build Windows ARM64
        if: matrix.target == 'windows-arm64'
        run: pnpm tauri build --target aarch64-pc-windows-msvc --bundles msi

      - name: Build Linux
        if: runner.os == 'Linux'
        run: pnpm tauri build --bundles appimage,deb,rpm

      - name: Prepare Windows assets
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          New-Item -ItemType Directory -Force -Path release-assets | Out-Null
          $tag = $env:GITHUB_REF_NAME
          $isArm64 = '${{ matrix.target }}' -eq 'windows-arm64'
          $root = if ($isArm64) { 'src-tauri/target/aarch64-pc-windows-msvc/release' } else { 'src-tauri/target/release' }
          $suffix = if ($isArm64) { '-arm64' } else { '' }

          $msi = Get-ChildItem -Path (Join-Path $root 'bundle') -Recurse -Filter *.msi | Select-Object -First 1
          if ($null -eq $msi) { throw 'Windows MSI installer was not generated' }
          if (-not (Test-Path "$($msi.FullName).sig")) { throw 'Windows updater signature was not generated' }
          $msiName = "ZX-Code-$tag-Windows$suffix.msi"
          Copy-Item $msi.FullName "release-assets/$msiName"
          Copy-Item "$($msi.FullName).sig" "release-assets/$msiName.sig"

          $exe = Join-Path $root 'zx-code.exe'
          if (-not (Test-Path $exe)) { throw 'Windows executable was not generated' }
          $portableDir = 'release-assets/ZX-Code-Portable'
          New-Item -ItemType Directory -Force -Path $portableDir | Out-Null
          Copy-Item $exe $portableDir
          @('# ZX Code portable build marker', 'portable=true') | Set-Content "$portableDir/portable.ini" -Encoding utf8
          Compress-Archive -Path "$portableDir/*" -DestinationPath "release-assets/ZX-Code-$tag-Windows$suffix-Portable.zip"
          Remove-Item -Recurse -Force $portableDir

      - name: Prepare macOS assets
        if: matrix.target == 'macos-universal'
        shell: bash
        run: |
          set -euxo pipefail
          mkdir -p release-assets
          tag="${GITHUB_REF_NAME}"
          bundle="src-tauri/target/universal-apple-darwin/release/bundle"

          updater=$(find "$bundle" -name "*.app.tar.gz" -type f | head -1)
          test -n "$updater"
          test -f "$updater.sig"
          updater_name="ZX-Code-${tag}-macOS.app.tar.gz"
          cp "$updater" "release-assets/$updater_name"
          cp "$updater.sig" "release-assets/$updater_name.sig"

          app=$(find "$bundle" -name "*.app" -type d | head -1)
          test -n "$app"
          ditto -c -k --sequesterRsrc --keepParent "$app" "release-assets/ZX-Code-${tag}-macOS.zip"
          dmg=$(find "$bundle" -name "*.dmg" -type f | head -1 || true)
          [ -z "$dmg" ] || cp "$dmg" "release-assets/ZX-Code-${tag}-macOS.dmg"

      - name: Prepare Linux assets
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euxo pipefail
          mkdir -p release-assets
          tag="${GITHUB_REF_NAME}"
          arch="${{ matrix.arch }}"
          bundle="src-tauri/target/release/bundle"

          appimage=$(find "$bundle" -name "*.AppImage" -type f | head -1)
          test -n "$appimage"
          test -f "$appimage.sig"
          appimage_name="ZX-Code-${tag}-Linux-${arch}.AppImage"
          cp "$appimage" "release-assets/$appimage_name"
          cp "$appimage.sig" "release-assets/$appimage_name.sig"
          deb=$(find "$bundle" -name "*.deb" -type f | head -1 || true)
          rpm=$(find "$bundle" -name "*.rpm" -type f | head -1 || true)
          [ -z "$deb" ] || cp "$deb" "release-assets/ZX-Code-${tag}-Linux-${arch}.deb"
          [ -z "$rpm" ] || cp "$rpm" "release-assets/ZX-Code-${tag}-Linux-${arch}.rpm"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: release-assets-${{ matrix.target }}
          path: release-assets/*
          if-no-files-found: error

  publish:
    name: Publish release and updater manifest
    runs-on: ubuntu-22.04
    needs: build
    steps:
      - name: Checkout master
        uses: actions/checkout@v6
        with:
          ref: master

      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: release-assets-*
          path: release-assets
          merge-multiple: true

      - name: Generate updater manifest
        run: |
          node scripts/generate-updater-manifest.mjs \
            --assets release-assets \
            --repo "$GITHUB_REPOSITORY" \
            --tag "$GITHUB_REF_NAME" \
            --output latest.json

      - name: Publish stable release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          name: ZX Code ${{ github.ref_name }}
          prerelease: false
          generate_release_notes: true
          body: |
            ## ZX Code ${{ github.ref_name }}

            - 新增启动时的新版本提醒，可直接下载、安装并重启。
            - 自动更新失败或使用便携版时，统一前往 ZX Code 官方下载页。
            - 关于页移除 GitHub 与更新日志按钮。
            - 由于更新签名密钥已更换，v3.17.1 用户需从官网下载并手动安装本版本一次；从本版本开始支持后续应用内自动更新。

            ### 下载

            - Windows x64：`ZX-Code-${{ github.ref_name }}-Windows.msi` 或便携版 ZIP
            - Windows ARM64：文件名带 `Windows-arm64`
            - macOS Intel / Apple Silicon：Universal DMG 或 ZIP
            - Linux x64 / ARM64：AppImage、DEB 或 RPM
          files: release-assets/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish manifest to GitHub Pages
        shell: bash
        run: |
          set -euxo pipefail
          git pull --rebase origin master
          cp latest.json docs/latest.json
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/latest.json
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "docs: publish updater manifest for ${GITHUB_REF_NAME}"
          git push origin HEAD:master
