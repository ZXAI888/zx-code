name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-2022
            target: windows-x64
          - os: windows-11-arm
            target: windows-arm64
            rust-target: aarch64-pc-windows-msvc
          - os: ubuntu-22.04
            target: linux-x64
            arch: x86_64
          - os: ubuntu-22.04-arm
            target: linux-arm64
            arch: arm64
          - os: macos-14
            target: macos-universal
            rust-target: universal-apple-darwin

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Add Windows ARM64 target
        if: matrix.target == 'windows-arm64'
        run: rustup target add aarch64-pc-windows-msvc

      - name: Add macOS targets
        if: matrix.target == 'macos-universal'
        run: rustup target add aarch64-apple-darwin x86_64-apple-darwin

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euxo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential pkg-config curl wget file patchelf libssl-dev rpm \
            libgtk-3-dev librsvg2-dev libayatana-appindicator3-dev
          sudo apt-get install -y --no-install-recommends libwebkit2gtk-4.1-dev \
            || sudo apt-get install -y --no-install-recommends libwebkit2gtk-4.0-dev
          sudo apt-get install -y --no-install-recommends libsoup-3.0-dev \
            || sudo apt-get install -y --no-install-recommends libsoup2.4-dev

      - name: Setup pnpm
        if: matrix.target != 'windows-arm64'
        uses: pnpm/action-setup@v6
        with:
          version: 10.12.3
          run_install: false

      - name: Setup pnpm on Windows ARM64
        if: matrix.target == 'windows-arm64'
        shell: pwsh
        run: |
          corepack enable
          corepack prepare pnpm@10.12.3 --activate

      - name: Setup LLVM on Windows ARM64
        if: matrix.target == 'windows-arm64'
        shell: pwsh
        run: |
          $llvmBin = 'C:\Program Files\LLVM\bin'
          "LIBCLANG_PATH=$llvmBin" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          $llvmBin | Out-File -FilePath $env:GITHUB_PATH -Append -Encoding utf8

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build macOS Universal
        if: matrix.target == 'macos-universal'
        run: pnpm tauri build --target universal-apple-darwin

      - name: Build Windows x64
        if: matrix.target == 'windows-x64'
        run: pnpm tauri build

      - name: Build Windows ARM64
        if: matrix.target == 'windows-arm64'
        run: pnpm tauri build --target aarch64-pc-windows-msvc --bundles msi

      - name: Build Linux
        if: runner.os == 'Linux'
        run: pnpm tauri build --bundles appimage,deb,rpm

      - name: Prepare Windows assets
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          New-Item -ItemType Directory -Force -Path release-assets | Out-Null
          $tag = $env:GITHUB_REF_NAME
          $isArm64 = '${{ matrix.target }}' -eq 'windows-arm64'
          $root = if ($isArm64) { 'src-tauri/target/aarch64-pc-windows-msvc/release' } else { 'src-tauri/target/release' }
          $suffix = if ($isArm64) { '-arm64' } else { '' }
          $msi = Get-ChildItem -Path (Join-Path $root 'bundle') -Recurse -Filter *.msi | Select-Object -First 1
          if ($null -eq $msi) { throw 'Windows MSI installer was not generated' }
          Copy-Item $msi.FullName "release-assets/ZX-Code-$tag-Windows$suffix.msi"
          $exe = Join-Path $root 'zx-code.exe'
          if (-not (Test-Path $exe)) { throw 'Windows executable was not generated' }
          $portableDir = 'release-assets/ZX-Code-Portable'
          New-Item -ItemType Directory -Force -Path $portableDir | Out-Null
          Copy-Item $exe $portableDir
          @('# ZX Code portable build marker', 'portable=true') | Set-Content "$portableDir/portable.ini" -Encoding utf8
          Compress-Archive -Path "$portableDir/*" -DestinationPath "release-assets/ZX-Code-$tag-Windows$suffix-Portable.zip"
          Remove-Item -Recurse -Force $portableDir

      - name: Prepare macOS assets
        if: matrix.target == 'macos-universal'
        shell: bash
        run: |
          set -euxo pipefail
          mkdir -p release-assets
          tag="${GITHUB_REF_NAME}"
          app=$(find src-tauri/target/universal-apple-darwin/release/bundle -name "*.app" -type d | head -1)
          if [ -z "$app" ]; then
            echo "macOS app bundle was not generated" >&2
            exit 1
          fi
          ditto -c -k --sequesterRsrc --keepParent "$app" "release-assets/ZX-Code-${tag}-macOS.zip"
          dmg=$(find src-tauri/target/universal-apple-darwin/release/bundle -name "*.dmg" -type f | head -1 || true)
          if [ -n "$dmg" ]; then
            cp "$dmg" "release-assets/ZX-Code-${tag}-macOS.dmg"
          fi

      - name: Prepare Linux assets
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euxo pipefail
          mkdir -p release-assets
          tag="${GITHUB_REF_NAME}"
          arch="${{ matrix.arch }}"
          appimage=$(find src-tauri/target/release/bundle -name "*.AppImage" | head -1)
          if [ -z "$appimage" ]; then
            echo "Linux AppImage was not generated" >&2
            exit 1
          fi
          cp "$appimage" "release-assets/ZX-Code-${tag}-Linux-${arch}.AppImage"
          deb=$(find src-tauri/target/release/bundle -name "*.deb" | head -1 || true)
          rpm=$(find src-tauri/target/release/bundle -name "*.rpm" | head -1 || true)
          [ -z "$deb" ] || cp "$deb" "release-assets/ZX-Code-${tag}-Linux-${arch}.deb"
          [ -z "$rpm" ] || cp "$rpm" "release-assets/ZX-Code-${tag}-Linux-${arch}.rpm"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: release-assets-${{ matrix.target }}
          path: release-assets/*
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    runs-on: ubuntu-22.04
    needs: build
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: release-assets-*
          path: release-assets
          merge-multiple: true

      - name: Publish stable release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          name: ZX Code ${{ github.ref_name }}
          prerelease: false
          generate_release_notes: true
          body: |
            ## ZX Code ${{ github.ref_name }}

            基于 CC Switch v3.17.0 更新，保留 ZX Code 品牌与原有用户数据目录。

            ### 下载

            - Windows x64：`ZX-Code-${{ github.ref_name }}-Windows.msi` 或便携版 ZIP
            - Windows ARM64：文件名带 `Windows-arm64`
            - macOS Intel / Apple Silicon：Universal DMG 或 ZIP
            - Linux x64 / ARM64：AppImage、DEB 或 RPM

            本次发布未配置代码签名。Windows 和 macOS 可能显示系统安全提示。
          files: release-assets/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
