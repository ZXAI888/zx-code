<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ZX Code - 下载</title>
  <style>
    :root {
      --bg: #0f1117;
      --card: #1a1d27;
      --border: #2a2d3a;
      --text: #e4e4e7;
      --text-muted: #9ca3af;
      --accent: #6366f1;
      --accent-hover: #818cf8;
      --green: #22c55e;
      --win: #0ea5e9;
      --mac: #a855f7;
      --linux: #f97316;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }
    .container {
      max-width: 960px;
      margin: 0 auto;
      padding: 60px 24px;
    }
    .hero {
      text-align: center;
      margin-bottom: 48px;
    }
    .hero h1 {
      font-size: 2.5rem;
      font-weight: 700;
      margin-bottom: 12px;
      background: linear-gradient(135deg, var(--accent), var(--accent-hover));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .hero p {
      color: var(--text-muted);
      font-size: 1.1rem;
    }
    .version-badge {
      display: inline-block;
      margin-top: 16px;
      padding: 4px 14px;
      border-radius: 999px;
      background: var(--card);
      border: 1px solid var(--border);
      font-size: 0.85rem;
      color: var(--green);
      font-weight: 500;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 20px;
      margin-bottom: 48px;
    }
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 28px 24px;
      transition: border-color 0.2s, transform 0.2s;
    }
    .card:hover {
      border-color: var(--accent);
      transform: translateY(-2px);
    }
    .card-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
    }
    .card-icon {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.3rem;
    }
    .card-icon.win { background: rgba(14,165,233,0.15); }
    .card-icon.mac { background: rgba(168,85,247,0.15); }
    .card-icon.linux { background: rgba(249,115,22,0.15); }
    .card h3 { font-size: 1.1rem; font-weight: 600; }
    .card .desc {
      color: var(--text-muted);
      font-size: 0.85rem;
      margin-bottom: 18px;
      line-height: 1.5;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 20px;
      border-radius: 10px;
      font-size: 0.9rem;
      font-weight: 500;
      text-decoration: none;
      color: #fff;
      background: var(--accent);
      border: none;
      cursor: pointer;
      transition: background 0.2s;
      margin-right: 8px;
      margin-bottom: 8px;
    }
    .btn:hover { background: var(--accent-hover); }
    .btn-outline {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text);
    }
    .btn-outline:hover {
      border-color: var(--accent);
      color: var(--accent-hover);
      background: transparent;
    }
    .btn svg {
      width: 16px;
      height: 16px;
    }
    .loading {
      text-align: center;
      padding: 40px;
      color: var(--text-muted);
    }
    .spinner {
      display: inline-block;
      width: 24px;
      height: 24px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-bottom: 12px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .footer {
      text-align: center;
      padding-top: 32px;
      border-top: 1px solid var(--border);
      color: var(--text-muted);
      font-size: 0.85rem;
    }
    .footer a {
      color: var(--accent);
      text-decoration: none;
    }
    .footer a:hover { text-decoration: underline; }
    .mac-tip {
      margin-top: 24px;
      padding: 16px 20px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      font-size: 0.85rem;
      color: var(--text-muted);
      line-height: 1.6;
    }
    .mac-tip code {
      background: rgba(99,102,241,0.15);
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 0.82rem;
      color: var(--accent-hover);
    }
    .error-msg {
      text-align: center;
      padding: 40px;
      color: #ef4444;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="hero">
      <h1>ZX Code</h1>
      <p>Claude Code 供应商切换工具</p>
      <div id="version-badge" class="version-badge" style="display:none;"></div>
    </div>

    <div id="content">
      <div class="loading">
        <div class="spinner"></div>
        <p>正在获取最新版本...</p>
      </div>
    </div>

    <div class="footer">
      <p>
        <a href="https://github.com/ZXAI888/zx-code" target="_blank">GitHub</a>
        &nbsp;&middot;&nbsp;
        <a href="https://github.com/ZXAI888/zx-code/releases" target="_blank">所有版本</a>
      </p>
    </div>
  </div>

  <script>
    const REPO = 'ZXAI888/zx-code';
    const API = `https://api.github.com/repos/${REPO}/releases/latest`;

    const SVG_DOWNLOAD = '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>';

    function classify(name) {
      const n = name.toLowerCase();
      if (n.includes('windows') && n.endsWith('.msi')) return { os: 'win', label: 'Windows 安装版 (.msi)' };
      if (n.includes('windows') && n.includes('portable')) return { os: 'win', label: 'Windows 绿色版 (.zip)' };
      if (n.includes('macos') && n.endsWith('.zip')) return { os: 'mac', label: 'macOS (.zip)' };
      if (n.includes('linux') && n.includes('x86_64') && n.endsWith('.appimage')) return { os: 'linux', label: 'Linux x86_64 (.AppImage)' };
      if (n.includes('linux') && n.includes('x86_64') && n.endsWith('.deb')) return { os: 'linux', label: 'Linux x86_64 (.deb)' };
      if (n.includes('linux') && n.includes('x86_64') && n.endsWith('.rpm')) return { os: 'linux', label: 'Linux x86_64 (.rpm)' };
      if (n.includes('linux') && n.includes('arm64') && n.endsWith('.appimage')) return { os: 'linux', label: 'Linux ARM64 (.AppImage)' };
      if (n.includes('linux') && n.includes('arm64') && n.endsWith('.deb')) return { os: 'linux', label: 'Linux ARM64 (.deb)' };
      if (n.includes('linux') && n.includes('arm64') && n.endsWith('.rpm')) return { os: 'linux', label: 'Linux ARM64 (.rpm)' };
      return null;
    }

    async function load() {
      const content = document.getElementById('content');
      const badge = document.getElementById('version-badge');
      try {
        const res = await fetch(API);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();

        badge.textContent = data.tag_name;
        badge.style.display = 'inline-block';

        const groups = { win: [], mac: [], linux: [] };
        for (const asset of data.assets) {
          const info = classify(asset.name);
          if (info) {
            groups[info.os].push({ label: info.label, url: asset.browser_download_url, size: asset.size });
          }
        }

        const formatSize = (bytes) => {
          if (bytes > 1024 * 1024) return (bytes / 1024 / 1024).toFixed(1) + ' MB';
          return (bytes / 1024).toFixed(0) + ' KB';
        };

        const cards = [
          { key: 'win', icon: '🪟', title: 'Windows', desc: '支持 Windows 10/11 (64-bit)', color: 'win' },
          { key: 'mac', icon: '🍎', title: 'macOS', desc: '支持 macOS 10.15+ (Intel & Apple Silicon)', color: 'mac' },
          { key: 'linux', icon: '🐧', title: 'Linux', desc: '支持 x86_64 和 ARM64 架构', color: 'linux' },
        ];

        let html = '<div class="grid">';
        for (const card of cards) {
          const assets = groups[card.key];
          html += `
            <div class="card">
              <div class="card-header">
                <div class="card-icon ${card.color}">${card.icon}</div>
                <h3>${card.title}</h3>
              </div>
              <div class="desc">${card.desc}</div>
              <div>`;
          if (assets.length === 0) {
            html += '<span style="color:var(--text-muted);font-size:0.85rem;">暂无此平台的下载</span>';
          } else {
            for (const a of assets) {
              html += `<a class="btn" href="${a.url}">${SVG_DOWNLOAD} ${a.label} <span style="opacity:0.7;font-size:0.8rem;">(${formatSize(a.size)})</span></a>`;
            }
          }
          html += '</div></div>';
        }
        html += '</div>';

        html += `
          <div class="mac-tip">
            <strong>macOS 提示：</strong>如果打开时提示"已损坏"，请在终端执行：<br>
            <code>xattr -cr "/Applications/ZX Code.app"</code>
          </div>`;

        content.innerHTML = html;
      } catch (e) {
        content.innerHTML = `
          <div class="error-msg">
            <p>获取版本信息失败</p>
            <p style="margin-top:12px;">
              <a class="btn" href="https://github.com/${REPO}/releases" target="_blank">${SVG_DOWNLOAD} 前往 GitHub Releases 下载</a>
            </p>
          </div>`;
      }
    }

    load();
  </script>
</body>
</html>
